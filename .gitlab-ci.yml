image: docker:latest  # ✅ Ajout de l'image Docker

stages:
  - build
  - deploy

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO"

before_script:
  - apk add --no-cache aws-cli  # ✅ Installe AWS CLI (Alpine Linux)
  - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
  - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
  - aws configure set region $AWS_REGION
  - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

build:
  stage: build
  services:
    - docker:dind  # ✅ Ajout du service Docker-in-Docker
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG
  only:
    - main

deploy:
  stage: deploy
  script:
    - aws apprunner start-deployment --service-arn $APP_RUNNER_SERVICE_ARN
  only:
    - main